<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resource Mapper</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica,
          Arial, sans-serif;
        margin: 2em;
        background-color: #f4f4f9;
        color: #333;
      }
      .container {
        display: flex;
        gap: 2em;
        flex-wrap: wrap;
      }
      .panel {
        flex: 1;
        min-width: 400px;
        background: white;
        padding: 1.5em;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        text-align: center;
        color: #1e1e1e;
      }
      h2 {
        color: #444;
        border-bottom: 2px solid #eef;
        padding-bottom: 0.5em;
      }
      p {
        color: #666;
      }
      select {
        width: 100%;
        padding: 0.8em;
        margin: 1em 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        background-color: #fff;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }

      /* Updated and new styles for the resource list */
      .resource-item {
        background-color: #e9efff;
        padding: 1em;
        margin-bottom: 0.75em;
        border-radius: 6px;
      }
      .resource-item .hash-value {
        font-family: 'SF Mono', 'Courier New', monospace;
        font-size: 0.9em;
        word-break: break-all;
        font-weight: bold;
        color: #335d9d;
        margin-bottom: 0.5em;
      }
      .resource-item .access-times {
        list-style-type: disc;
        margin-left: 20px;
        padding-left: 5px;
      }
      .resource-item .access-times li {
        font-family: sans-serif;
        font-size: 0.85em;
        color: #555;
        padding: 0.2em 0;
        margin: 0;
      }
      #origins-list li {
        /* Style for the second panel */
        background-color: #e9efff;
        padding: 0.75em;
        margin-bottom: 0.5em;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Cross-Origin Storage</h1>
    <div class="container">
      <div class="panel">
        <h2>View by Origin</h2>
        <p>
          Select an origin to see its shared resources and last access times.
        </p>
        <select id="origin-select"></select>
        <ul id="hashes-list"></ul>
      </div>
      <div class="panel">
        <h2>View by Resource Hash</h2>
        <p>Select a resource hash to see which origins use it.</p>
        <select id="hash-select"></select>
        <ul id="origins-list"></ul>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
